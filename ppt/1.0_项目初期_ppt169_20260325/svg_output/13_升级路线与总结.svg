<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
<rect x="0" y="0" width="1280" height="720" fill="#F7F9FC" rx="0"/>
<rect x="0" y="0" width="1280" height="70" fill="#1F4E79" rx="0"/>
<rect x="0" y="0" width="6" height="70" fill="#C43D3D" rx="0"/>
<text x="40" y="46" text-anchor="start" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold">03 升级路线与总结</text>
<text x="1220" y="46" text-anchor="end" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">Ink-Diffusion</text>
<rect x="0" y="70" width="1280" height="50" fill="#E8EEF5" rx="0"/>
<rect x="0" y="70" width="6" height="50" fill="#2F6B8A" rx="0"/>
<text x="40" y="102" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">升级方向可以压缩为两条主线：多条件融合，以及分层的面向风格采样调度</text>
<line x1="40" y1="665" x2="1240" y2="665" stroke="#C9D3DF" stroke-width="1"/>
<text x="40" y="695" text-anchor="start" fill="#7A8795" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="normal">数据来源：项目讲稿整理</text>
<text x="640" y="695" text-anchor="middle" fill="#7A8795" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="normal">瓶颈与改造方向</text>
<text x="1220" y="695" text-anchor="end" fill="#5B6573" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="normal">13</text>
<rect x="70" y="170" width="180" height="90" fill="#FFFFFF" rx="8"/>
<rect x="70" y="170" width="180" height="90" fill="none" rx="8" stroke="#2F6B8A" stroke-width="1"/>
<text x="160.0" y="222" text-anchor="middle" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">输入与预处理</text>
<rect x="280" y="170" width="220" height="90" fill="#FFFFFF" rx="8"/>
<rect x="280" y="170" width="220" height="90" fill="none" rx="8" stroke="#2F6B8A" stroke-width="1"/>
<text x="390.0" y="222" text-anchor="middle" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">Depth + Edge + Mask</text>
<rect x="540" y="170" width="190" height="90" fill="#FFFFFF" rx="8"/>
<rect x="540" y="170" width="190" height="90" fill="none" rx="8" stroke="#2F6B8A" stroke-width="1"/>
<text x="635.0" y="222" text-anchor="middle" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">Condition Fusion</text>
<rect x="790" y="170" width="200" height="90" fill="#FFFFFF" rx="8"/>
<rect x="790" y="170" width="200" height="90" fill="none" rx="8" stroke="#2F6B8A" stroke-width="1"/>
<text x="890.0" y="222" text-anchor="middle" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">Streaming UNet</text>
<rect x="1020" y="170" width="190" height="90" fill="#FFFFFF" rx="8"/>
<rect x="1020" y="170" width="190" height="90" fill="none" rx="8" stroke="#2F6B8A" stroke-width="1"/>
<text x="1115.0" y="222" text-anchor="middle" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">Two-Stage Ink Sampling</text>
<line x1="250" y1="215" x2="268" y2="215" stroke="#2F6B8A" stroke-width="2"/>
<polygon points="260,209 260,221 268,215" fill="#2F6B8A"/>
<line x1="500" y1="215" x2="528" y2="215" stroke="#2F6B8A" stroke-width="2"/>
<polygon points="520,209 520,221 528,215" fill="#2F6B8A"/>
<line x1="730" y1="215" x2="778" y2="215" stroke="#2F6B8A" stroke-width="2"/>
<polygon points="770,209 770,221 778,215" fill="#2F6B8A"/>
<line x1="990" y1="215" x2="1008" y2="215" stroke="#2F6B8A" stroke-width="2"/>
<polygon points="1000,209 1000,221 1008,215" fill="#2F6B8A"/>
<text x="80" y="316" text-anchor="start" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">对应的改造动作</text>
<circle cx="86" cy="351" r="4" fill="#2F6B8A"/>
<text x="102" y="356" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">把 encode_depth 从逐帧 min-max 归一化改成更稳定的时序归一化</text>
<circle cx="86" cy="393" r="4" fill="#2F6B8A"/>
<text x="102" y="398" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">从 depth-only 升级为 depth + edge/lineart，并引入前景背景分离</text>
<circle cx="86" cy="435" r="4" fill="#2F6B8A"/>
<text x="102" y="440" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">让早期 timestep 更偏结构、后期 timestep 更偏墨韵</text>
<circle cx="86" cy="477" r="4" fill="#2F6B8A"/>
<text x="102" y="482" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">训练 temporal adapter / temporal LoRA，并把 cache 复用升级为可学习记忆</text>
<rect x="760" y="320" width="460" height="260" fill="#E8EEF5" rx="8"/>
<rect x="760" y="320" width="460" height="260" fill="none" rx="8" stroke="#C9D3DF" stroke-width="1"/>
<text x="790" y="358" text-anchor="start" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">答辩结论</text>
<text x="790" y="402" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="normal"><tspan x="790" dy="0">1. Live2Diff 的价值在于提供实时视频扩散底座。</tspan><tspan x="790" dy="42">2. 当前系统的真正中枢是 UNet，而不是 demo 或 LoRA。</tspan><tspan x="790" dy="42">3. 面向高质量实时水墨，关键差距在条件控制与时序建模。</tspan></text>
<rect x="60" y="610" width="1160" height="38" fill="#F5F9FC" rx="8"/>
<text x="80" y="635" text-anchor="start" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">一句话概括：从“能跑起来的实时视频扩散”走向“稳定可控的实时水墨视频”，核心在于让结构条件和时序记忆真正面向水墨服务。</text>
</svg>
