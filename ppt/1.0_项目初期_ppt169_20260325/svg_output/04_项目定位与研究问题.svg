<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
<rect x="0" y="0" width="1280" height="720" fill="#F7F9FC" rx="0"/>
<rect x="0" y="0" width="1280" height="70" fill="#1F4E79" rx="0"/>
<rect x="0" y="0" width="6" height="70" fill="#C43D3D" rx="0"/>
<text x="40" y="46" text-anchor="start" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold">01 项目定位与研究问题</text>
<text x="1220" y="46" text-anchor="end" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">Ink-Diffusion</text>
<rect x="0" y="70" width="1280" height="50" fill="#E8EEF5" rx="0"/>
<rect x="0" y="70" width="6" height="50" fill="#2F6B8A" rx="0"/>
<text x="40" y="102" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">本项目聚焦实时扩散系统拆解与水墨导向改造，而不是重训新模型</text>
<line x1="40" y1="665" x2="1240" y2="665" stroke="#C9D3DF" stroke-width="1"/>
<text x="40" y="695" text-anchor="start" fill="#7A8795" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="normal">数据来源：项目讲稿梳理</text>
<text x="640" y="695" text-anchor="middle" fill="#7A8795" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="normal">研究定位与系统理解</text>
<text x="1220" y="695" text-anchor="end" fill="#5B6573" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="normal">04</text>
<rect x="60" y="150" width="360" height="220" fill="#FFFFFF" rx="8"/>
<rect x="60" y="150" width="360" height="220" fill="none" rx="8" stroke="#C9D3DF" stroke-width="1"/>
<use data-icon="target" x="84" y="176" width="24" height="24" fill="#1F4E79"/>
<text x="120" y="196" text-anchor="start" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">研究问题</text>
<circle cx="86" cy="233" r="4" fill="#2F6B8A"/>
<text x="102" y="238" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">在接近实时约束下，把逐帧处理改造成流式推理</text>
<circle cx="86" cy="267" r="4" fill="#2F6B8A"/>
<text x="102" y="272" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">在现有实时底座上逼近水墨风格的留白与笔触要求</text>
<circle cx="86" cy="301" r="4" fill="#2F6B8A"/>
<text x="102" y="306" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">回答系统结构、瓶颈与面向水墨的改造方式</text>
<rect x="450" y="150" width="770" height="220" fill="#FFFFFF" rx="8"/>
<rect x="450" y="150" width="770" height="220" fill="none" rx="8" stroke="#C9D3DF" stroke-width="1"/>
<use data-icon="microchip" x="474" y="176" width="24" height="24" fill="#1F4E79"/>
<text x="510" y="196" text-anchor="start" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">项目定位</text>
<circle cx="476" cy="233" r="4" fill="#2F6B8A"/>
<text x="492" y="238" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">底层生成骨架来自 Live2Diff，而不是从零训练新的视频扩散模型</text>
<circle cx="476" cy="267" r="4" fill="#2F6B8A"/>
<text x="492" y="272" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">当前重点是结构拆解、机制分析、瓶颈定位与面向水墨的系统改造设计</text>
<circle cx="476" cy="301" r="4" fill="#2F6B8A"/>
<text x="492" y="306" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">因此它更像“面向水墨视频的实时扩散系统研究”，而非单纯风格 LoRA 调参</text>
<rect x="60" y="400" width="1160" height="180" fill="#F9FBFD" rx="8"/>
<rect x="60" y="400" width="1160" height="180" fill="none" rx="8" stroke="#C9D3DF" stroke-width="1"/>
<text x="88" y="436" text-anchor="start" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">答辩主线</text>
<text x="88" y="478" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="normal"><tspan x="88" dy="0">1. 先解释为什么选择 Live2Diff，以及这套系统的技术边界。</tspan><tspan x="88" dy="34">2. 再拆解实时性的真正来源、UNet 的核心地位，以及缓存与条件注入机制。</tspan><tspan x="88" dy="34">3. 最后说明为什么它还不足以支撑高质量水墨，并给出对应的升级路线。</tspan></text>
</svg>
