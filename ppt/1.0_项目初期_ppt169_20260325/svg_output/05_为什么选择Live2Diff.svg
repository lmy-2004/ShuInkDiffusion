<text x="640" y="695" text-anchor="middle" fill="#7A8795" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="normal">研究定位与系统理解</text>
<text x="1220" y="695" text-anchor="end" fill="#5B6573" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="normal">05</text>
<rect x="60" y="150" width="540" height="430" fill="#FFFFFF" rx="8"/>
