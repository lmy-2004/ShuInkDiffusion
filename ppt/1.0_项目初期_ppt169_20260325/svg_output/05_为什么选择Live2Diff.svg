<text x="40" y="102" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">选择 Live2Diff 的原因，在于它已经解决了实时视频扩散里最难的共性问题</text>
