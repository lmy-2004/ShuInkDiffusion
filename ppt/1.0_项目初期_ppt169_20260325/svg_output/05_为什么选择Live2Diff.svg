<text x="700" y="196" text-anchor="start" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">项目总体技术边界</text>
<circle cx="666" cy="233" r="4" fill="#2F6B8A"/>
<text x="682" y="238" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="normal">基础骨架：SD1.5 latent diffusion</text>
<circle cx="666" cy="275" r="4" fill="#2F6B8A"/>
<text x="682" y="280" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="normal">视频能力：Streaming UNet + temporal attention + KV-cache</text>
<circle cx="666" cy="317" r="4" fill="#2F6B8A"/>
<text x="682" y="322" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="normal">实时性：LCM few-step + denoising batch + 加速后端</text>
<circle cx="666" cy="359" r="4" fill="#2F6B8A"/>
<text x="682" y="364" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="normal">结构稳定：MiDaS 深度先验</text>
<circle cx="666" cy="401" r="4" fill="#2F6B8A"/>
<text x="682" y="406" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="normal">风格表达：prompt、DreamBooth、LoRA 等外部风格资源</text>
<rect x="60" y="600" width="1160" height="40" fill="#E8EEF5" rx="8"/>
<text x="80" y="626" text-anchor="start" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">结论：Live2Diff 的价值不是“已经会画水墨”，而是提供了一套成立的实时视频扩散底座。</text>
