<circle cx="86" cy="317" r="4" fill="#2F6B8A"/>
<text x="102" y="322" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="normal">Depth Prior 结构约束</text>
