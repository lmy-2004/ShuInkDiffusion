<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
<rect x="0" y="0" width="1280" height="720" fill="#F7F9FC" rx="0"/>
<rect x="0" y="0" width="1280" height="70" fill="#1F4E79" rx="0"/>
<rect x="0" y="0" width="6" height="70" fill="#C43D3D" rx="0"/>
<text x="40" y="46" text-anchor="start" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold">02 缓存与结构条件机制</text>
<text x="1220" y="46" text-anchor="end" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">Ink-Diffusion</text>
<rect x="0" y="70" width="1280" height="50" fill="#E8EEF5" rx="0"/>
<rect x="0" y="70" width="6" height="50" fill="#2F6B8A" rx="0"/>
<text x="40" y="102" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">noisy batch、双 buffer、KV-cache 与 depth 条件一起，构成了这套系统的运行骨架</text>
<line x1="40" y1="665" x2="1240" y2="665" stroke="#C9D3DF" stroke-width="1"/>
<text x="40" y="695" text-anchor="start" fill="#7A8795" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="normal">数据来源：项目讲稿整理</text>
<text x="640" y="695" text-anchor="middle" fill="#7A8795" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="normal">关键机制拆解</text>
<text x="1220" y="695" text-anchor="end" fill="#5B6573" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="normal">10</text>
<rect x="60" y="150" width="570" height="190" fill="#FFFFFF" rx="8"/>
<rect x="60" y="150" width="570" height="190" fill="none" rx="8" stroke="#C9D3DF" stroke-width="1"/>
<use data-icon="layers" x="80" y="170" width="24" height="24" fill="#1F4E79"/>
<text x="116" y="192" text-anchor="start" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">noisy batch 的严格含义</text>
<circle cx="82" cy="231" r="4" fill="#2F6B8A"/>
<text x="98" y="236" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">不是“多帧一起生成”</text>
<circle cx="82" cy="261" r="4" fill="#2F6B8A"/>
<text x="98" y="266" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">而是把不同去噪阶段的中间状态拼成 batch</text>
<circle cx="82" cy="291" r="4" fill="#2F6B8A"/>
<text x="98" y="296" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">收益是减少 UNet 调用，代价是固定流水线延迟</text>
<rect x="650" y="150" width="570" height="190" fill="#FFFFFF" rx="8"/>
<rect x="650" y="150" width="570" height="190" fill="none" rx="8" stroke="#C9D3DF" stroke-width="1"/>
<use data-icon="database" x="670" y="170" width="24" height="24" fill="#1F4E79"/>
<text x="706" y="192" text-anchor="start" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">PrevXT / PrevDepth Buffer</text>
<circle cx="672" cy="231" r="4" fill="#2F6B8A"/>
<text x="688" y="236" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">保存尚未完成去噪的 latent 中间状态</text>
<circle cx="672" cy="261" r="4" fill="#2F6B8A"/>
<text x="688" y="266" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">并绑定对应 depth 条件，避免结构错位</text>
<circle cx="672" cy="291" r="4" fill="#2F6B8A"/>
<text x="688" y="296" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">本质是为少步扩散维持可滚动流水线</text>
<rect x="60" y="380" width="570" height="190" fill="#FFFFFF" rx="8"/>
<rect x="60" y="380" width="570" height="190" fill="none" rx="8" stroke="#C9D3DF" stroke-width="1"/>
<use data-icon="server" x="80" y="400" width="24" height="24" fill="#1F4E79"/>
<text x="116" y="422" text-anchor="start" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">KV-cache 的作用与边界</text>
<circle cx="82" cy="461" r="4" fill="#2F6B8A"/>
<text x="98" y="466" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">缓存的是历史 temporal attention 的 K/V 特征</text>
<circle cx="82" cy="491" r="4" fill="#2F6B8A"/>
<text x="98" y="496" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">配合 attn_bias、pe_idx、update_idx 形成滚动记忆</text>
<circle cx="82" cy="521" r="4" fill="#2F6B8A"/>
<text x="98" y="526" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">不是把过去原图再看一遍</text>
<rect x="650" y="380" width="570" height="190" fill="#FFFFFF" rx="8"/>
<rect x="650" y="380" width="570" height="190" fill="none" rx="8" stroke="#C9D3DF" stroke-width="1"/>
<use data-icon="mountains" x="670" y="400" width="24" height="24" fill="#1F4E79"/>
<text x="706" y="422" text-anchor="start" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">Depth 在主路径里的真实角色</text>
<circle cx="672" cy="461" r="4" fill="#2F6B8A"/>
<text x="688" y="466" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">它不是标准 ControlNet</text>
<circle cx="672" cy="491" r="4" fill="#2F6B8A"/>
<text x="688" y="496" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">更接近主干入口的轻量结构注入</text>
<circle cx="672" cy="521" r="4" fill="#2F6B8A"/>
<text x="688" y="526" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">优势是轻量稳定，职责是结构约束而不是风格表达</text>
</svg>
