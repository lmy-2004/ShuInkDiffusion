<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
<rect x="0" y="0" width="1280" height="720" fill="#F7F9FC" rx="0" />
<rect x="0" y="0" width="1280" height="70" fill="#1F4E79" rx="0" />
<rect x="0" y="0" width="6" height="70" fill="#C43D3D" rx="0" />
<text x="40" y="46" text-anchor="start" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold">03 当前系统的核心短板</text>
<text x="1220" y="46" text-anchor="end" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">Ink-Diffusion</text>
<rect x="0" y="70" width="1280" height="50" fill="#E8EEF5" rx="0" />
<rect x="0" y="70" width="6" height="50" fill="#2F6B8A" rx="0" />
<text x="40" y="102" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">现有系统对普通风格化已经很强，但离稳定的高质量水墨视频仍有明显距离</text>
<line x1="40" y1="665" x2="1240" y2="665" stroke="#C9D3DF" stroke-width="1" />
<text x="40" y="695" text-anchor="start" fill="#7A8795" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="normal">数据来源：项目讲稿整理</text>
<text x="640" y="695" text-anchor="middle" fill="#7A8795" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="normal">瓶颈与改造方向</text>
<text x="1220" y="695" text-anchor="end" fill="#5B6573" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="normal">12</text>
<path fill="#FFFFFF" d="M68,150 H612 A8,8 0 0 1 620,158 V572 A8,8 0 0 1 612,580 H68 A8,8 0 0 1 60,572 V158 A8,8 0 0 1 68,150 Z" />
<path fill="none" stroke="#C9D3DF" stroke-width="1" d="M68,150 H612 A8,8 0 0 1 620,158 V572 A8,8 0 0 1 612,580 H68 A8,8 0 0 1 60,572 V158 A8,8 0 0 1 68,150 Z" />
<text x="88" y="188" text-anchor="start" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">三个直接短板</text>
<path fill="#F9FBFD" d="M94,230 H586 A8,8 0 0 1 594,238 V314 A8,8 0 0 1 586,322 H94 A8,8 0 0 1 86,314 V238 A8,8 0 0 1 94,230 Z" />
<path fill="none" stroke="#C9D3DF" stroke-width="1" d="M94,230 H586 A8,8 0 0 1 594,238 V314 A8,8 0 0 1 586,322 H94 A8,8 0 0 1 86,314 V238 A8,8 0 0 1 94,230 Z" />
<text x="108" y="264" text-anchor="start" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">1 depth-only 条件不足</text>
<text x="108" y="294" text-anchor="start" fill="#5B6573" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="normal">无法表达留白组织、轮廓干净程度、飞白与墨色层次</text>
<path fill="#F9FBFD" d="M94,338 H586 A8,8 0 0 1 594,346 V422 A8,8 0 0 1 586,430 H94 A8,8 0 0 1 86,422 V346 A8,8 0 0 1 94,338 Z" />
<path fill="none" stroke="#C9D3DF" stroke-width="1" d="M94,338 H586 A8,8 0 0 1 594,346 V422 A8,8 0 0 1 586,430 H94 A8,8 0 0 1 86,422 V346 A8,8 0 0 1 94,338 Z" />
<text x="108" y="372" text-anchor="start" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">2 时序机制主要保连续</text>
<text x="108" y="402" text-anchor="start" fill="#5B6573" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="normal">能抑制普通闪烁，但不专门保笔触与白底稳定</text>
<path fill="#F9FBFD" d="M94,446 H586 A8,8 0 0 1 594,454 V530 A8,8 0 0 1 586,538 H94 A8,8 0 0 1 86,530 V454 A8,8 0 0 1 94,446 Z" />
<path fill="none" stroke="#C9D3DF" stroke-width="1" d="M94,446 H586 A8,8 0 0 1 594,454 V530 A8,8 0 0 1 586,538 H94 A8,8 0 0 1 86,530 V454 A8,8 0 0 1 94,446 Z" />
<text x="108" y="480" text-anchor="start" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">3 采样与预处理不够水墨友好</text>
<text x="108" y="510" text-anchor="start" fill="#5B6573" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="normal">时序归一化、采样强度与过滤策略都还偏通用</text>
<path fill="#FFFFFF" d="M668,150 H1212 A8,8 0 0 1 1220,158 V572 A8,8 0 0 1 1212,580 H668 A8,8 0 0 1 660,572 V158 A8,8 0 0 1 668,150 Z" />
<path fill="none" stroke="#C9D3DF" stroke-width="1" d="M668,150 H1212 A8,8 0 0 1 1220,158 V572 A8,8 0 0 1 1212,580 H668 A8,8 0 0 1 660,572 V158 A8,8 0 0 1 668,150 Z" />
<text x="688" y="188" text-anchor="start" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">更本质的技术归因</text>
<circle cx="688" cy="231" r="4" fill="#2F6B8A" />
<text x="704" y="236" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">结构条件过于单一：只有 depth，没有 edge / lineart / 前景背景约束</text>
<circle cx="688" cy="275" r="4" fill="#2F6B8A" />
<text x="704" y="280" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">时序一致性目标过于通用：追求“少抖动”，却不等于“笔触连续”</text>
<circle cx="688" cy="319" r="4" fill="#2F6B8A" />
<text x="704" y="324" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">风格控制仍偏静态：缺少面向水墨的阶段化采样与动态控制</text>
<circle cx="688" cy="363" r="4" fill="#2F6B8A" />
<text x="704" y="368" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">记忆机制可复用但不可学习：尚未升级到风格敏感的递归时序记忆</text>
<path fill="#FFF8F8" d="M668,510 H1212 A8,8 0 0 1 1220,518 V572 A8,8 0 0 1 1212,580 H668 A8,8 0 0 1 660,572 V518 A8,8 0 0 1 668,510 Z" />
<path fill="none" stroke="#E7CACA" stroke-width="1" d="M668,510 H1212 A8,8 0 0 1 1220,518 V572 A8,8 0 0 1 1212,580 H668 A8,8 0 0 1 660,572 V518 A8,8 0 0 1 668,510 Z" />
<text font-weight="bold" text-anchor="start" font-size="20" fill="#C43D3D" font-family="Microsoft YaHei, Arial, sans-serif" x="688" y="538">因此，当前差距的核心不是算力不够，</text><text font-weight="bold" text-anchor="start" font-size="20" fill="#C43D3D" font-family="Microsoft YaHei, Arial, sans-serif" x="688" y="564">而是水墨特有的条件控制与时序建模还没有进入主路径。</text></svg>