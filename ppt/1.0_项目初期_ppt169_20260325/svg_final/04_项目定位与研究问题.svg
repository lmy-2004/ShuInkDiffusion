    <path fill-rule="evenodd" clip-rule="evenodd" d="M8 0C3.58172 0 0 3.58172 0 8C0 12.4183 3.58172 16 8 16C12.4183 16 16 12.4183 16 8C16 3.58172 12.4183 0 8 0ZM2 8C2 4.68629 4.68629 2 8 2C11.3137 2 14 4.68629 14 8C14 11.3137 11.3137 14 8 14C4.68629 14 2 11.3137 2 8Z" />
  </g>
<text x="120" y="196" text-anchor="start" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">研究问题</text>
<circle cx="86" cy="233" r="4" fill="#2F6B8A" />
<text x="102" y="238" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">在接近实时约束下，把逐帧处理改造成流式推理</text>
<circle cx="86" cy="267" r="4" fill="#2F6B8A" />
<text x="102" y="272" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">在现有实时底座上逼近水墨风格的留白与笔触要求</text>
<circle cx="86" cy="301" r="4" fill="#2F6B8A" />
<text x="102" y="306" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">回答系统结构、瓶颈与面向水墨的改造方式</text>
<path fill="#FFFFFF" d="M458,150 H1212 A8,8 0 0 1 1220,158 V362 A8,8 0 0 1 1212,370 H458 A8,8 0 0 1 450,362 V158 A8,8 0 0 1 458,150 Z" />
<path fill="none" stroke="#C9D3DF" stroke-width="1" d="M458,150 H1212 A8,8 0 0 1 1220,158 V362 A8,8 0 0 1 1212,370 H458 A8,8 0 0 1 450,362 V158 A8,8 0 0 1 458,150 Z" />

  <g transform="translate(474.0, 176.0) scale(1.5)" fill="#1F4E79">
    <path d="M6 10V6H10V10H6Z" />
    <path fill-rule="evenodd" clip-rule="evenodd" d="M3 2V0H5V2H7V0H9V2H11V0H13V2H14V3H16V5H14V7H16V9H14V11H16V13H14V14H13V16H11V14H9V16H7V14H5V16H3V14H2V13H0V11H2V9H0V7H2L2 5H0V3H2L2 2H3ZM4 4V12H12V4H4Z" />
  </g>
<text x="510" y="196" text-anchor="start" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">项目定位</text>
<circle cx="476" cy="233" r="4" fill="#2F6B8A" />
<text x="492" y="238" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">底层生成骨架来自 Live2Diff，而不是从零训练新的视频扩散模型</text>
<circle cx="476" cy="267" r="4" fill="#2F6B8A" />
<text x="492" y="272" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">当前重点是结构拆解、机制分析、瓶颈定位与面向水墨的系统改造设计</text>
<circle cx="476" cy="301" r="4" fill="#2F6B8A" />
<text x="492" y="306" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">因此它更像“面向水墨视频的实时扩散系统研究”，而非单纯风格 LoRA 调参</text>
<path fill="#F9FBFD" d="M68,400 H1212 A8,8 0 0 1 1220,408 V572 A8,8 0 0 1 1212,580 H68 A8,8 0 0 1 60,572 V408 A8,8 0 0 1 68,400 Z" />
<path fill="none" stroke="#C9D3DF" stroke-width="1" d="M68,400 H1212 A8,8 0 0 1 1220,408 V572 A8,8 0 0 1 1212,580 H68 A8,8 0 0 1 60,572 V408 A8,8 0 0 1 68,400 Z" />
<text x="88" y="436" text-anchor="start" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">答辩主线</text>
<text font-weight="normal" text-anchor="start" font-size="20" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" x="88" y="478">1. 先解释为什么选择 Live2Diff，以及这套系统的技术边界。</text><text font-weight="normal" text-anchor="start" font-size="20" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" x="88" y="512">2. 再拆解实时性的真正来源、UNet 的核心地位，以及缓存与条件注入机制。</text><text font-weight="normal" text-anchor="start" font-size="20" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" x="88" y="546">3. 最后说明为什么它还不足以支撑高质量水墨，并给出对应的升级路线。</text></svg>