<text x="80" y="316" text-anchor="start" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">对应的改造动作</text>
<circle cx="86" cy="351" r="4" fill="#2F6B8A" />
<text x="102" y="356" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">把 encode_depth 从逐帧 min-max 归一化改成更稳定的时序归一化</text>
<circle cx="86" cy="393" r="4" fill="#2F6B8A" />
<text x="102" y="398" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">从 depth-only 升级为 depth + edge/lineart，并引入前景背景分离</text>
<circle cx="86" cy="435" r="4" fill="#2F6B8A" />
<text x="102" y="440" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">让早期 timestep 更偏结构、后期 timestep 更偏墨韵</text>
<circle cx="86" cy="477" r="4" fill="#2F6B8A" />
<text x="102" y="482" text-anchor="start" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="normal">训练 temporal adapter / temporal LoRA，并把 cache 复用升级为可学习记忆</text>
<path fill="#E8EEF5" d="M768,320 H1212 A8,8 0 0 1 1220,328 V572 A8,8 0 0 1 1212,580 H768 A8,8 0 0 1 760,572 V328 A8,8 0 0 1 768,320 Z" />
<path fill="none" stroke="#C9D3DF" stroke-width="1" d="M768,320 H1212 A8,8 0 0 1 1220,328 V572 A8,8 0 0 1 1212,580 H768 A8,8 0 0 1 760,572 V328 A8,8 0 0 1 768,320 Z" />
<text x="790" y="358" text-anchor="start" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">答辩结论</text>
<text font-weight="normal" text-anchor="start" font-size="20" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" x="790" y="402">1. Live2Diff 的价值在于提供实时视频扩散底座。</text><text font-weight="normal" text-anchor="start" font-size="20" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" x="790" y="444">2. 当前系统的真正中枢是 UNet，而不是 demo 或 LoRA。</text><text font-weight="normal" text-anchor="start" font-size="20" fill="#1A1A1A" font-family="Microsoft YaHei, Arial, sans-serif" x="790" y="486">3. 面向高质量实时水墨，关键差距在条件控制与时序建模。</text><path fill="#F5F9FC" d="M68,610 H1212 A8,8 0 0 1 1220,618 V640 A8,8 0 0 1 1212,648 H68 A8,8 0 0 1 60,640 V618 A8,8 0 0 1 68,610 Z" />
<text x="80" y="635" text-anchor="start" fill="#1F4E79" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">一句话概括：从“能跑起来的实时视频扩散”走向“稳定可控的实时水墨视频”，核心在于让结构条件和时序记忆真正面向水墨服务。</text>
</svg>