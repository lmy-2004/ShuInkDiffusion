pretrained_model_path: "../models/Model/stable-diffusion-v1-5"

motion_module_path: '../models/live2diff.ckpt'
depth_model_path: '../models/dpt_hybrid_384.pt'
# width: 512
# height: 512

width: 512
height: 512

unet_additional_kwargs:
  cond_mapping: true
  use_inflated_groupnorm:          true
  use_motion_module              : true
  motion_module_resolutions      : [ 1,2,4,8 ]
  unet_use_cross_frame_attention : false
  unet_use_temporal_attention    : true

  motion_module_type: Streaming
  motion_module_kwargs:
    num_attention_heads                : 8
    num_transformer_block              : 1
    attention_block_types              : [ "Temporal_Self", "Temporal_Self" ]
    temporal_position_encoding         : true
    temporal_position_encoding_max_len : 24
    temporal_attention_dim_div         : 1
    zero_initialize                    : true

    attention_class_name               : 'stream'

    attention_kwargs:
      window_size: 16
      sink_size: 8

noise_scheduler_kwargs:
  num_train_timesteps: 1000
  beta_start:    0.00085
  beta_end:      0.012
  beta_schedule: "linear"
  steps_offset:  1
  clip_sample:   False

conditioning_kwargs:
  use_softedge: true
  softedge_scale: 0.6
  depth_scale: 0.6
  softedge_mode: "classical"
  softedge_debug: true

stylization_kwargs:
  enable_stylize_preprocess: true
  depth_blur_sigma: 6
  depth_power: 0.2
  depth_smoothstep_min: 0.5
  depth_smoothstep_max: 1.0
  saturation_scale: 0.2
  image_blur_sigma: 6
  fog_white_mix: 0.7
  outline_blur_sigma: 5
  outline_power: 1.1
  outline_smoothstep_min: 0.1
  outline_smoothstep_max: 0.8

noise_control:
  enabled: true
  low_threshold: 0.015
  high_threshold: 0.06
  min_noise_rate: 1.0
  max_noise_rate: 1.0
  enable_warped_noise: true
  # 与 warped_noise_residual 互补为 1；也可用旧键 warped_noise_reuse / warped_noise_residual（会按和归一化）
  warped_noise_blend: 0.99
  flow_max_side: 256

key_step_sync:
  enabled: true
  key_step_index: 0
  strength: 0.18
  low_threshold: 0.015
  high_threshold: 0.06
  flow_backend: "farneback"

subject_mask:
  debug: true
  backend: "auto"
  keyframe_interval: 8
  ema: 0.65
  fog_depth_mask_blend: 0.45
  fog_blur_sigma: 1.0

third_party_dict:
  # dreambooth: "../models/Model/aziibpixelmix_v10.safetensors"
  # dreambooth: "../models/Model/disneyPixarCartoon_v10.safetensors"
  dreambooth: "../models/Model/guohua.ckpt"
  
  lora_list:
    # - lora: '../models/LoRA/DiscoElysiumStyle.safetensors'
    # - lora: '../models/LoRA/kFeltedReV.safetensors'
    - lora: '../models/LoRA/MoXinV1.safetensors'
    # - lora: '../models/LoRA/inkwatercolor.safetensors'
      lora_alpha: 0.7
  clip_skip: 2

num_inference_steps: 50
t_index_list: [30, 40]
prompt: "shuimobysim,minimalist composition,negative space,expressive brushwork,chinese ink painting,guohua style,wash painting,freehand style,soft ink diffusion,poetic atmosphere,empty background,sparse details,"
